<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PetShop Amigo Fiel</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="bg-primary text-white py-3">
    <div class="container">
        <h1 class="text-center">PetShop Amigo Fiel</h1>
        
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="servicos.html">Serviços</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="cadastro.html">Cadastro</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="agendamento.html">Agendamento</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </nav>
    </div>
</header>

<main class="container my-5">
    <h2 class="text-center mb-4">Cadastro de Cliente e Pet</h2>
    
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form id="formCadastro" class="row g-3">
                        <!-- Dados do Cliente -->
                        <h3 class="text-primary">🐱 Dados do Cliente</h3>
                        
                        <div class="col-md-6">
                            <label for="nome" class="form-label">Nome Completo *</label>
                            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="cpf" class="form-label">CPF *</label>
                            <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                        </div>
                        
                        <div class="col-12">
                            <label for="endereco" class="form-label">Endereço *</label>
                            <input type="text" class="form-control" id="endereco" placeholder="Rua, número, bairro" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="telefone" class="form-label">Telefone *</label>
                            <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-9999" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="email" class="form-label">E-mail *</label>
                            <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Sexo *</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="sexo" id="masculino" value="Masculino" required>
                                <label class="form-check-label" for="masculino">Masculino</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="sexo" id="feminino" value="Feminino">
                                <label class="form-check-label" for="feminino">Feminino</label>
                            </div>
                        </div>
                        
                        <!-- Dados do Pet -->
                        <h3 class="text-primary mt-4">🐕 Dados do Pet</h3>
                        
                        <div class="col-md-4">
                            <label for="nomePet" class="form-label">Nome do Pet *</label>
                            <input type="text" class="form-control" id="nomePet" placeholder="Nome do seu animal" required>
                        </div>
                        
                        <div class="col-md-4">
                            <label for="raca" class="form-label">Raça</label>
                            <input type="text" class="form-control" id="raca" placeholder="Ex: Labrador, Siamês">
                        </div>
                        
                        <div class="col-md-4">
                            <label for="idade" class="form-label">Idade (anos)</label>
                            <input type="number" class="form-control" id="idade" placeholder="0" min="0" max="30">
                        </div>
                        
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="confirmacao" required>
                                <label class="form-check-label" for="confirmacao">
                                    Confirmo que os dados informados são verdadeiros *
                                </label>
                            </div>
                        </div>
                        
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Cadastrar</button>
                            <button type="reset" class="btn btn-secondary">Limpar</button>
                        </div>
                    </form>
                    
                    <div id="mensagemSucesso" class="alert alert-success mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <p>Autor: Nicolas Savio</p>
    <p>Email: contato@petshop.com</p>
    <p>Projeto acadêmico - Fundamentos de Sistemas Web</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
